services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://app:secret@app-db:5432/app?sslmode=disable
    depends_on:
      app-db:
        condition: service_healthy

  app-db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=app
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 3s
      timeout: 3s
      retries: 10

  test:
    image: golang:1.26-alpine
    environment:
      - CONFIG_PATH=/app/config.yaml
      - DATABASE_URL=postgres://app:secret@app-test-db:5432/app?sslmode=disable
    volumes:
      - .:/app
    working_dir: /app
    command: go test -v -count=1 ./tests/
    depends_on:
      app-test-db:
        condition: service_healthy

  app-test-db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=app
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
